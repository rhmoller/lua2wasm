<!doctype html>
<meta charset="utf-8">
<title>lua2wasm browser sanity</title>
<pre id="out"></pre>
<script type="module">
const out = document.getElementById("out");
const log = (...a) => { out.textContent += a.join(" ") + "\n"; };

const url = new URLSearchParams(location.search).get("mod") || "print_sum.wasm";
const bytes = await (await fetch(url)).arrayBuffer();
await WebAssembly.instantiate(bytes, {
    host: { print: (v) => log(String(v)) },
});
</script>
